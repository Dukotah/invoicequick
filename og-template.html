<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Source for og-image.png (1200x630). Render with headless Chrome/Edge:
     msedge --headless --window-size=1200,630 --screenshot=og-image.png og-template.html -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#faf8f4;font-family:"Hanken Grotesk",sans-serif;color:#14181f;overflow:hidden;position:relative}
  .ring{position:absolute;width:560px;height:560px;border:70px solid #f6ebe2;border-radius:50%;right:-200px;top:-150px;opacity:.8}
  .pad{position:absolute;inset:0;padding:74px 80px;display:flex;flex-direction:column;justify-content:space-between;z-index:1}
  .brandrow{display:flex;align-items:center;gap:16px}
  .brandrow .wm{font-family:"Fraunces",serif;font-weight:700;font-size:30px;letter-spacing:-.02em}
  .eyebrow{color:#8f4a22;font-weight:700;font-size:21px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
  h1{font-family:"Fraunces",serif;font-weight:700;font-size:74px;line-height:1.04;letter-spacing:-.015em;max-width:18ch}
  .lede{color:#665f54;font-size:27px;margin-top:22px;max-width:30ch}
  .foot{display:flex;align-items:center;gap:14px;color:#665f54;font-size:20px;font-weight:600}
  .pill{background:#e3eeef;color:#13525a;border:1px solid #cfe1e3;border-radius:999px;padding:8px 18px;font-size:19px;font-weight:700}
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="pad">
    <div class="brandrow">
      <svg width="56" height="56" viewBox="0 0 64 64" aria-hidden="true">
        <rect x="11" y="6" width="33" height="46" rx="4" fill="#13525a"/>
        <line x1="18" y1="17" x2="37" y2="17" stroke="#faf8f4" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="18" y1="24" x2="37" y2="24" stroke="#cbd2da" stroke-width="2.4" stroke-linecap="round"/>
        <circle cx="43" cy="44" r="13" fill="#bf6b3c"/>
        <text x="43" y="49.4" font-family="Fraunces,Georgia,serif" font-size="17" font-weight="700" fill="#faf8f4" text-anchor="middle">$</text>
      </svg>
      <span class="wm">InvoiceQuick</span>
    </div>
    <div>
      <p class="eyebrow">Free invoice generator</p>
      <h1>Send a clean invoice in two minutes.</h1>
      <p class="lede">Fill in your client &amp; line items, download a PDF. No signup, nothing uploaded.</p>
    </div>
    <div class="foot">
      <span class="pill">100% in your browser</span>
      <span>A Copper Bay Labs product</span>
    </div>
  </div>
</body>
</html>
